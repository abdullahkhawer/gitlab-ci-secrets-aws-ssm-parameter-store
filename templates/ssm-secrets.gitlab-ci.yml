# GitLab CI Template: AWS SSM Parameter Store via OIDC
#
# Usage — in your .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/abdullahkhawer/gitlab-ci-secrets-aws-ssm-parameter-store/master/templates/ssm-secrets.gitlab-ci.yml'
#
# Required CI/CD variables (set in GitLab Settings → CI/CD → Variables):
#   SSM_ROLE_ARN      — ARN of the IAM role to assume via OIDC
#   SSM_AWS_REGION    — AWS region where parameters live (e.g. eu-west-1)
#   SSM_OIDC_AUDIENCE — OIDC audience; must match the IAM IdP (e.g. https://gitlab.com)
#
# Shell requirement:
#   The script requires bash (uses pipefail and process substitution).
#   Most GitLab Runner executors default to bash. Verify your runner shell
#   is bash before using this template.
#
# AWS CLI:
#   If 'aws' is not found in the runner image, the AWS CLI is installed automatically.
#   apt-get/yum/dnf/fallback paths use the official AWS CLI v2 installer.
#   apk (Alpine) installs from the Alpine package repository: v2 on Alpine ≥3.17,
#   v1 on older releases. curl and unzip must be available on the fallback path if
#   none of the above package managers are present.
#
# Per-job, per-project, or per-group variable convention:
#   AWS_SSM_PARAM_<NAME> — Set to the SSM parameter path to fetch. The parameter
#                          is fetched and exported as <NAME>. Any number of these
#                          variables can be defined.
#                          Jobs that define no AWS_SSM_PARAM_* variables make no
#                          AWS calls at all.
#                          Examples:
#                            AWS_SSM_PARAM_DB_PASSWORD: "/myapp/prod/DB_PASSWORD"
#                            AWS_SSM_PARAM_API_KEY: "/myapp/prod/api/KEY"
#
# Each fetched parameter is exported under the variable name suffix, exactly as
# written (GitLab enforces letters, numbers, and underscores only):
#   AWS_SSM_PARAM_DB_PASSWORD=/myapp/prod/DB_PASSWORD → export DB_PASSWORD=<value>
#   AWS_SSM_PARAM_API_KEY=/myapp/prod/api/KEY         → export API_KEY=<value>
# SecureString parameters are always decrypted.
#
# ── Usage Options ───────────────────────────────────────────────────────
#
# You have 3 options to define `AWS_SSM_PARAM_*` variables.
#
# Let's assume that the Parameter Key from AWS SSM Parameter Store is `/myapp/prod/db_password` and you want its value inside `$DB_PASSWORD` variable.
#
# Option 1 — via GitLab Settings (Settings -> CI/CD -> Variables)
#
#   Add `AWS_SSM_PARAM_DB_PASSWORD=/myapp/prod/db_password` in Settings.
#
#   — **No YAML changes needed - GitLab will make `$DB_PASSWORD` variable available automatically in all pipeline jobs**
#
# Option 2 — inline variables
#   ```yaml
#   job:
#     variables:
#       AWS_SSM_PARAM_DB_PASSWORD: "/myapp/prod/db_password"
#   ```
#
# Option 3 — composing with an existing before_script via !reference:
#   ```yaml
#   job:
#     variables:
#       AWS_SSM_PARAM_DB_PASSWORD: "/myapp/prod/db_password"
#     before_script:
#       - !reference [.fetch-ssm-secrets, before_script]
#   ```

# YAML anchor — single source of truth, reused in default: and .fetch-ssm-secrets:
.ssm-fetch-script: &ssm-fetch-script
  - |
    if env | grep -q '^AWS_SSM_PARAM_'; then
      set -euo pipefail

      if [ -z "${SSM_ROLE_ARN:-}" ];        then echo "ERROR: SSM_ROLE_ARN is not set."        >&2; exit 1; fi
      if [ -z "${SSM_AWS_REGION:-}" ];      then echo "ERROR: SSM_AWS_REGION is not set."      >&2; exit 1; fi
      if [ -z "${SSM_OIDC_AUDIENCE:-}" ];   then echo "ERROR: SSM_OIDC_AUDIENCE is not set."   >&2; exit 1; fi
      if [ -z "${GITLAB_OIDC_TOKEN:-}" ];   then echo "ERROR: GITLAB_OIDC_TOKEN is not set."   >&2; exit 1; fi

      if ! command -v aws > /dev/null 2>&1; then
        echo "INFO: aws CLI not found — installing..." >&2
        if command -v apt-get > /dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq --no-install-recommends ca-certificates curl unzip
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli
          rm -rf /tmp/awscliv2.zip /tmp/aws
        elif command -v apk > /dev/null 2>&1; then
          apk add --no-cache aws-cli
        elif command -v yum > /dev/null 2>&1; then
          yum install -y unzip curl
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli
          rm -rf /tmp/awscliv2.zip /tmp/aws
        elif command -v dnf > /dev/null 2>&1; then
          dnf install -y unzip curl
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli
          rm -rf /tmp/awscliv2.zip /tmp/aws
        else
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli
          rm -rf /tmp/awscliv2.zip /tmp/aws
        fi
        if ! command -v aws > /dev/null 2>&1; then
          echo "ERROR: aws CLI installation failed." >&2; exit 1
        fi
      fi

      IFS=$'\t' read -r _key _secret _token < <(
        aws sts assume-role-with-web-identity \
          --role-arn           "${SSM_ROLE_ARN}" \
          --role-session-name  "gitlab-ssm-${CI_JOB_ID}" \
          --web-identity-token "${GITLAB_OIDC_TOKEN}" \
          --region             "${SSM_AWS_REGION}" \
          --duration-seconds   900 \
          --query              "[Credentials.AccessKeyId,Credentials.SecretAccessKey,Credentials.SessionToken]" \
          --output             text
      )
      if [ -z "${_key:-}" ]; then echo "ERROR: Failed to assume role '${SSM_ROLE_ARN}'." >&2; exit 1; fi

      # Write credentials to isolated temp files and point the AWS CLI at them via
      # env vars so that pre-existing ~/.aws/ credentials are never touched or lost.
      _ssm_exports=$(mktemp)
      _aws_creds=$(mktemp)
      _aws_config=$(mktemp)
      chmod 600 "${_ssm_exports}" "${_aws_creds}" "${_aws_config}"
      trap 'rm -f "${_aws_creds}" "${_aws_config}" "${_ssm_exports}"' EXIT
      printf '[default]\naws_access_key_id=%s\naws_secret_access_key=%s\naws_session_token=%s\n' \
        "${_key}" "${_secret}" "${_token}" > "${_aws_creds}"
      printf '[default]\nregion=%s\n' "${SSM_AWS_REGION}" > "${_aws_config}"
      export AWS_SHARED_CREDENTIALS_FILE="${_aws_creds}"
      export AWS_CONFIG_FILE="${_aws_config}"
      unset _key _secret _token

      while IFS= read -r _line; do
        _env_var="${_line%%=*}"
        _var="${_env_var#AWS_SSM_PARAM_}"
        _path="${_line#*=}"
        if [ -z "${_path}" ]; then echo "ERROR: ${_env_var} has no value set." >&2; exit 1; fi
        _value=$(
          aws ssm get-parameter \
            --name             "${_path}" \
            --with-decryption \
            --region           "${SSM_AWS_REGION}" \
            --query            "Parameter.Value" \
            --output           text
        )
        printf 'export %s=%q\n' "${_var}" "${_value}" >> "${_ssm_exports}"
        unset _value
      done < <(env | grep '^AWS_SSM_PARAM_')
      unset _line _env_var _var _path

      unset AWS_SHARED_CREDENTIALS_FILE AWS_CONFIG_FILE
      rm -f "${_aws_creds}" "${_aws_config}"

      if [ -f "${_ssm_exports}" ]; then
        # shellcheck source=/dev/null
        source "${_ssm_exports}"
        rm -f "${_ssm_exports}"
      fi
    fi

# Options 1 and 2: applied automatically to every job that has no before_script
default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: "${SSM_OIDC_AUDIENCE}"
  before_script: *ssm-fetch-script

# Option 3: reference this in jobs that define their own before_script
.fetch-ssm-secrets:
  before_script: *ssm-fetch-script
